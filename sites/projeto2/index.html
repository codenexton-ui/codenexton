<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Admin | Mobile Ready</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
        @media (max-width: 768px) {
            .sidebar-closed { transform: translateX(-100%); }
            .sidebar-open { transform: translateX(0); }
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex overflow-hidden">

    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-20 hidden md:hidden backdrop-blur-sm"></div>

    <aside id="sidebar" class="fixed md:relative w-64 h-full bg-gray-800 border-r border-gray-700 flex flex-col z-30 sidebar-transition sidebar-closed md:transform-none">
        <div class="p-6 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg"><i data-lucide="layers" class="text-white w-5 h-5"></i></div>
                <span class="text-xl font-bold tracking-tight text-white">NEXUS<span class="text-blue-500">ERP</span></span>
            </div>
            <button onclick="toggleSidebar()" class="md:hidden text-gray-400 hover:text-white">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
        </div>

        <nav class="flex-1 px-4 space-y-2 mt-4">
            <button onclick="switchTab('dashboard')" id="nav-dashboard" class="w-full flex items-center gap-3 p-3 rounded-lg bg-blue-600 text-white transition-all">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
            </button>
            <button onclick="switchTab('users')" id="nav-users" class="w-full flex items-center gap-3 p-3 rounded-lg text-gray-400 hover:bg-gray-700 hover:text-white transition-all">
                <i data-lucide="users" class="w-5 h-5"></i> Usuários
            </button>
            <button onclick="switchTab('reports')" id="nav-reports" class="w-full flex items-center gap-3 p-3 rounded-lg text-gray-400 hover:bg-gray-700 hover:text-white transition-all">
                <i data-lucide="bar-chart-3" class="w-5 h-5"></i> Relatórios
            </button>
        </nav>

        <div class="p-4 border-t border-gray-700">
            <div class="flex items-center gap-3 p-2 bg-gray-700/50 rounded-xl">
                <img src="https://ui-avatars.com/api/?name=Admin&background=2563eb&color=fff" class="w-8 h-8 rounded-full" alt="Avatar">
                <div class="truncate">
                    <p class="text-xs font-semibold">Admin Principal</p>
                    <p class="text-[10px] text-gray-400">admin@nexus.com</p>
                </div>
            </div>
        </div>
    </aside>

    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <header class="h-16 bg-gray-800 border-b border-gray-700 flex items-center justify-between px-4 md:px-8 shrink-0">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="p-2 hover:bg-gray-700 rounded-lg md:hidden">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
                <div class="relative hidden sm:block">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 w-4 h-4"></i>
                    <input type="text" placeholder="Buscar..." class="bg-gray-900 border border-gray-700 rounded-lg py-1.5 pl-10 pr-4 focus:outline-none focus:border-blue-500 text-sm w-48 lg:w-64">
                </div>
            </div>
            
            <div class="flex items-center gap-3 md:gap-6">
                <button onclick="toggleModal(true)" class="bg-blue-600 hover:bg-blue-700 text-white p-2 md:px-4 md:py-2 rounded-lg flex items-center gap-2 text-sm font-medium">
                    <i data-lucide="plus" class="w-4 h-4"></i>
                    <span class="hidden md:inline">Novo</span>
                </button>
                <button class="relative text-gray-400 hover:text-white">
                    <i data-lucide="bell" class="w-5 h-5"></i>
                    <span class="absolute -top-1 -right-1 bg-red-500 text-[10px] w-3.5 h-3.5 rounded-full flex items-center justify-center">3</span>
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-4 md:p-8">
            <div id="content-area" class="max-w-7xl mx-auto">
                
                <section id="view-dashboard" class="space-y-6">
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-2">
                        <h1 class="text-2xl font-bold">Dashboard</h1>
                        <span class="text-xs text-gray-500 bg-gray-800 px-3 py-1 rounded-full border border-gray-700">Sync: <span id="last-update">...</span></span>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div class="bg-gray-800 p-5 rounded-xl border border-gray-700">
                            <p class="text-gray-400 text-xs font-medium uppercase tracking-wider">Receita</p>
                            <div class="flex items-baseline justify-between mt-2">
                                <h2 class="text-2xl font-bold" id="kpi-revenue">R$ 0</h2>
                                <span class="text-green-500 text-xs font-bold">+12%</span>
                            </div>
                        </div>
                        <div class="bg-gray-800 p-5 rounded-xl border border-gray-700">
                            <p class="text-gray-400 text-xs font-medium uppercase tracking-wider">Usuários</p>
                            <div class="flex items-baseline justify-between mt-2">
                                <h2 class="text-2xl font-bold" id="kpi-users">0</h2>
                                <span class="text-green-500 text-xs font-bold">+5%</span>
                            </div>
                        </div>
                        <div class="bg-gray-800 p-5 rounded-xl border border-gray-700 lg:col-span-1">
                            <p class="text-gray-400 text-xs font-medium uppercase tracking-wider">Conversão</p>
                            <div class="flex items-baseline justify-between mt-2">
                                <h2 class="text-2xl font-bold">3.4%</h2>
                                <span class="text-red-400 text-xs font-bold">-2%</span>
                            </div>
                        </div>
                        <div class="bg-gray-800 p-5 rounded-xl border border-gray-700 lg:col-span-1">
                            <p class="text-gray-400 text-xs font-medium uppercase tracking-wider">Alertas</p>
                            <div class="flex items-baseline justify-between mt-2">
                                <h2 class="text-2xl font-bold text-yellow-500">7</h2>
                                <i data-lucide="alert-circle" class="w-4 h-4 text-yellow-500"></i>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div class="lg:col-span-2 bg-gray-800 p-6 rounded-xl border border-gray-700 min-h-[350px]">
                            <h3 class="text-sm font-semibold mb-4 text-gray-300">Performance de Vendas</h3>
                            <div class="h-64"><canvas id="lineChart"></canvas></div>
                        </div>
                        <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 min-h-[350px]">
                            <h3 class="text-sm font-semibold mb-4 text-gray-300">Setores</h3>
                            <div class="h-64"><canvas id="barChart"></canvas></div>
                        </div>
                    </div>
                </section>

                <section id="view-users" class="hidden space-y-6">
                    <h1 class="text-2xl font-bold">Usuários</h1>
                    <div class="bg-gray-800 rounded-xl border border-gray-700 overflow-x-auto">
                        <table class="w-full text-left min-w-[600px]">
                            <thead class="bg-gray-900/50 text-gray-400 text-xs uppercase">
                                <tr>
                                    <th class="p-4">Usuário</th>
                                    <th class="p-4">Status</th>
                                    <th class="p-4 text-right">Ações</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-700 text-sm">
                                <tr class="hover:bg-gray-700/30 transition-colors">
                                    <td class="p-4 flex items-center gap-3">
                                        <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center font-bold">JS</div>
                                        <div>
                                            <p class="font-medium">João Silva</p>
                                            <p class="text-xs text-gray-500">joao@nexus.com</p>
                                        </div>
                                    </td>
                                    <td class="p-4"><span class="bg-green-500/10 text-green-500 px-2 py-0.5 rounded text-[10px] font-bold uppercase">Ativo</span></td>
                                    <td class="p-4 text-right">
                                        <button class="text-gray-400 hover:text-white p-1"><i data-lucide="more-vertical" class="w-4 h-4"></i></button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/70 backdrop-blur-md z-50 hidden flex items-center justify-center p-4">
        <div class="bg-gray-800 w-full max-w-sm rounded-xl border border-gray-700 p-6 shadow-2xl">
            <h3 class="text-lg font-bold mb-4">Adicionar Item</h3>
            <input type="text" placeholder="Nome do Registro" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2.5 mb-4 text-sm focus:border-blue-500 outline-none">
            <div class="flex gap-3">
                <button onclick="toggleModal(false)" class="flex-1 py-2 text-sm bg-gray-700 rounded-lg">Voltar</button>
                <button class="flex-1 py-2 text-sm bg-blue-600 rounded-lg font-bold">Criar</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // LÓGICA DO TOGGLE SIDEBAR
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            
            sidebar.classList.toggle('sidebar-closed');
            sidebar.classList.toggle('sidebar-open');
            overlay.classList.toggle('hidden');
        }

        // LÓGICA DAS ABAS
        function switchTab(tab) {
            ['dashboard', 'users', 'reports'].forEach(t => {
                const section = document.getElementById(`view-${t}`);
                if (section) section.classList.add('hidden');
                
                const btn = document.getElementById(`nav-${t}`);
                if (btn) {
                    btn.classList.remove('bg-blue-600', 'text-white');
                    btn.classList.add('text-gray-400');
                }
            });

            document.getElementById(`view-${tab}`).classList.remove('hidden');
            const activeBtn = document.getElementById(`nav-${tab}`);
            activeBtn.classList.add('bg-blue-600', 'text-white');
            activeBtn.classList.remove('text-gray-400');

            // No mobile, fecha a sidebar ao trocar de aba
            if (window.innerWidth < 768) toggleSidebar();
        }

        function toggleModal(s) { document.getElementById('modal').classList.toggle('hidden', !s); }

        // CHARTS & DATA
        const ctxL = document.getElementById('lineChart').getContext('2d');
        const line = new Chart(ctxL, {
            type: 'line',
            data: { labels: ['00h', '04h', '08h', '12h', '16h', '20h'], datasets: [{ data: [10, 45, 30, 70, 60, 90], borderColor: '#3b82f6', tension: 0.4, borderWidth: 3, pointRadius: 0 }] },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { color: '#374151' } } } }
        });

        const ctxB = document.getElementById('barChart').getContext('2d');
        new Chart(ctxB, {
            type: 'doughnut',
            data: { labels: ['SaaS', 'Ads', 'Consultoria'], datasets: [{ data: [300, 50, 100], backgroundColor: ['#3b82f6', '#8b5cf6', '#10b981'], borderWidth: 0, hoverOffset: 4 }] },
            options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#9ca3af', font: { size: 10 } } } } }
        });

        // UPDATE SIMULATOR
        setInterval(() => {
            document.getElementById('kpi-revenue').innerText = 'R$ ' + (Math.random() * 100000).toLocaleString('pt-BR', {maximumFractionDigits: 0});
            document.getElementById('kpi-users').innerText = Math.floor(Math.random() * 5000);
            document.getElementById('last-update').innerText = new Date().toLocaleTimeString();
            line.data.datasets[0].data.push(Math.random() * 100);
            line.data.datasets[0].data.shift();
            line.update('none');
        }, 5000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeNextOn - Leads Automáticos</title>

<style>
body {
    font-family: Arial;
    background: #020617;
    color: white;
    padding: 20px;
}
.container {
    max-width: 900px;
    margin: auto;
    text-align: center;
}
.card {
    background: #0f172a;
    padding: 15px;
    border-radius: 10px;
    margin-top: 10px;
}
button {
    padding: 10px 15px;
    background: #22c55e;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    margin: 5px;
}
</style>
</head>

<body>

<div class="container">
    <h1>🚀 CodeNextOn Leads</h1>
    <p>Geração automática de contatos</p>

    <button onclick="gerarLista()">🔄 Atualizar Números</button>

    <div id="lista"></div>
</div>

<script>

// GERA NÚMERO MAIS REALISTA
function gerarNumero() {
    let numero = "55119";

    let segundoDigito = [9,8,7,6,5][Math.floor(Math.random()*5)];
    numero += segundoDigito;

    for (let i = 0; i < 7; i++) {
        numero += Math.floor(Math.random() * 10);
    }

    // evita números repetidos tipo 000000
    if (/(\d)\1{4,}/.test(numero)) {
        return gerarNumero();
    }

    return numero;
}

// MENSAGEM INSTITUCIONAL
function gerarMensagem() {
    return `Bom dia, tudo bem?

Somos a CodeNextOn, uma empresa especializada na criação de sites profissionais e sistemas personalizados.

Ajudamos negócios a fortalecer sua presença online, aumentar a visibilidade e atrair mais clientes através da internet.

Mesmo que não seja para agora, vale a pena conhecer nosso trabalho e entender como isso pode ajudar no futuro.

Acesse nosso site:
https://CodeNextOn.com.br

Ficamos à disposição 😊`;
}

// GERA LISTA
function gerarLista() {
    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    for (let i = 0; i < 20; i++) {
        let numero = gerarNumero();
        let msg = gerarMensagem();

        let link = https://wa.me/${numero}?text=${encodeURIComponent(msg)};
        let check = https://wa.me/${numero};

        lista.innerHTML += `
            <div class="card">
                📞 ${numero}<br><br>

                <a href="${link}" target="_blank">
                    <button>Enviar Mensagem</button>
                </a>

                <a href="${check}" target="_blank">
                    <button>Testar WhatsApp</button>
                </a>
            </div>
        `;
    }
}

// GERA AUTOMÁTICO AO ABRIR
gerarLista();

</script>

</body>
</html>

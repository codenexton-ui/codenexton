<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeNextOn - Leads Automáticos</title>

<style>
body {
    font-family: Arial;
    background: #020617;
    color: white;
    padding: 20px;
}
.container {
    max-width: 900px;
    margin: auto;
    text-align: center;
}
.card {
    background: #0f172a;
    padding: 15px;
    border-radius: 10px;
    margin-top: 10px;
}
button {
    padding: 10px 15px;
    background: #22c55e;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    margin: 5px;
}
</style>
</head>

<body>

<div class="container">
    <h1>🚀 CodeNextOn Leads</h1>
    <p>Geração automática de contatos</p>

    <button onclick="gerarLista()">🔄 Atualizar Números</button>

    <div id="lista"></div>
</div>

<script>

// GERAR NÚMERO
function gerarNumero() {
    let numero = "55119";

    let segundoDigito = [9,8,7,6,5][Math.floor(Math.random()*5)];
    numero += segundoDigito;

    for (let i = 0; i < 7; i++) {
        numero += Math.floor(Math.random() * 10);
    }

    return numero;
}

// MENSAGEM
function gerarMensagem() {
    return "Bom dia, tudo bem?\n\n" +
    "Somos a CodeNextOn, especializados na criação de sites profissionais e sistemas personalizados.\n\n" +
    "Ajudamos empresas a aumentar sua presença online e atrair mais clientes.\n\n" +
    "Conheça nosso trabalho:\n" +
    "https://CodeNextOn.com.br\n\n" +
    "Ficamos à disposição 😊";
}

// GERAR LISTA
function gerarLista() {
    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    for (let i = 0; i < 20; i++) {
        let numero = gerarNumero();
        let msg = gerarMensagem();

        let link = "https://wa.me/" + numero + "?text=" + encodeURIComponent(msg);

        let div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            📞 ${numero}<br><br>

            <a href="${link}" target="_blank">
                <button>Enviar Mensagem</button>
            </a>
        `;

        lista.appendChild(div);
    }
}

window.onload = gerarLista;

</script>

</body>
</html>
